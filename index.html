<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Maestrie Du Berry</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/html/nav.css">
    <link rel="stylesheet" href="assets/html/footer.css">
    <link rel="stylesheet" href="assets/html/partenaires.css">
    <link rel="stylesheet" href="assets/html/data.css">
    
    <script defer type="text/javascript" src="assets/html/nav.js"></script>
    <script defer type="text/javascript" src="assets/html/data.js"></script>

<!-- CDN -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

    <div id="nav"></div>
    <img src="/assets/img/ImgAccuel.jpg" alt="Membres de la troupe" class="main-img">

    <div>
        <h2>DATA</h2>
        <div id="data"></div>
    </div>

    <div>
        <h2>Ils nous font confiance depuis 2012</h2>
        <div id="partenaires"></div>
    </div>

    

    <div id="footer"></div>
    
    <script>
        document.addEventListener("DOMContentLoaded", (event) => {
              fetch('assets/html/nav.html')
                .then(response => response.text())
                .then(data => document.getElementById('nav').innerHTML = data);
        });
        document.addEventListener("DOMContentLoaded", (event) => {
              fetch('assets/html/footer.html')
                .then(response => response.text())
                .then(data => document.getElementById('footer').innerHTML = data);
        });
        document.addEventListener("DOMContentLoaded", (event) => {
              fetch('assets/html/partenaires.html')
                .then(response => response.text())
                .then(data => document.getElementById('partenaires').innerHTML = data);
        });
        document.addEventListener("DOMContentLoaded", (event) => {
              fetch('assets/html/data.html')
                .then(response => response.text())
                .then(data => document.getElementById('data').innerHTML = data);
        });
        </script>
    
</body>
</html>
